<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIG Technology — Navigate complexity and reduce risk</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS 3 (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        navy: '#07101f',
                        'navy-light': '#0d1b2e',
                        'navy-lighter': '#112240',
                        purple: '#503D81',
                        'purple-dark': '#3d2f65',
                        pink: '#F56C81',
                        'pink-dark': '#d9556a',
                        teal: '#00c8d7',
                        'off-white': '#e8e0f5',
                        muted: '#9ba5b6',
                    },
                    backgroundImage: {
                        'radial-gradient': 'radial-gradient(var(--tw-gradient-stops))',
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        html { scroll-behavior: smooth; }
        body { background-color: #07101f; color: white; -webkit-font-smoothing: antialiased; }
        
        .section-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #F56C81;
            margin-bottom: 0.75rem;
        }
        
        .section-title {
            font-size: clamp(1.875rem, 4vw, 3rem);
            font-weight: 700;
            line-height: 1.2;
            color: white;
        }
        
        .section-subtitle {
            font-size: 1rem;
            color: #9ba5b6;
            margin-top: 1rem;
            max-width: 36rem;
            line-height: 1.625;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8125rem 1.75rem;
            border-radius: 0.375rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            border: none;
        }
        
        .btn-primary {
            background-color: #503D81;
            color: white;
        }
        .btn-primary:hover { background-color: #F56C81; transform: translateY(-1px); }
        
        .btn-outline {
            background-color: transparent;
            color: white;
            border: 1.5px solid rgba(255, 255, 255, 0.35);
        }
        .btn-outline:hover { 
            background-color: rgba(80, 61, 129, 0.2); 
            border-color: #503D81; 
            transform: translateY(-1px); 
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #07101f; }
        ::-webkit-scrollbar-thumb { background: #112240; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #503D81; }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- Icons ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        targets: [iconRef.current]
                    });
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className} ref={iconRef}></i>;
        };

        // --- Components ---

        const Navbar = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { name: 'About', href: '#about' },
                { name: 'Technology', href: '#technology' },
                { name: 'Services', href: '#services' },
                { name: 'Industries', href: '#industries' },
                { name: 'Publications', href: '#publications' },
                { name: 'Team', href: '#team' },
            ];

            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${isScrolled ? 'bg-navy/90 backdrop-blur-lg shadow-lg' : 'bg-transparent'}`}>
                    <div className="max-w-7xl mx-auto px-8 md:px-12 lg:px-16 h-18 flex items-center justify-between py-4">
                        <a href="#" className="flex items-center gap-2">
                            <img src="brand_assets/Dig-logo-coral-transparent.png" alt="DIG Technology" className="h-9 w-auto" />
                        </a>
                        <ul className="hidden md:flex items-center gap-9">
                            {navLinks.map(link => (
                                <li key={link.name}>
                                    <a href={link.href} className="text-sm font-medium text-off-white hover:text-pink transition-colors">{link.name}</a>
                                </li>
                            ))}
                        </ul>
                        <div className="flex items-center gap-3">
                            <a href="#contact" className="hidden md:inline-flex btn btn-outline">Contact Us</a>
                            <button className="md:hidden p-2 text-white" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>
                                <Icon name={isMobileMenuOpen ? "x" : "menu"} />
                            </button>
                        </div>
                    </div>
                    <AnimatePresence>
                        {isMobileMenuOpen && (
                            <motion.div initial={{ opacity: 0, y: -20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }} className="md:hidden absolute top-18 left-0 right-0 bg-navy-light border-t border-white/10 p-6 flex flex-col gap-5 shadow-2xl">
                                {navLinks.map(link => (
                                    <a key={link.name} href={link.href} className="text-base font-medium text-off-white py-2 border-b border-white/10" onClick={() => setIsMobileMenuOpen(false)}>{link.name}</a>
                                ))}
                                <a href="#contact" className="btn btn-outline w-fit" onClick={() => setIsMobileMenuOpen(false)}>Contact Us</a>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </nav>
            );
        };

        const Hero = () => {
            const SLIDES = [
                {
                    eyebrow: 'Subsurface Intelligence Platform',
                    headingHtml: <>Navigate <span className="text-pink">complexity</span><br />and reduce risk</>,
                    description: 'DIG Technology delivers world-class seismic data processing, imaging, and geophysical analysis — built for every stage of the field lifecycle, from pioneer exploration to CO₂ monitoring.',
                    type: 'portrait',
                    src: 'brand_assets/Per.png',
                    alt: 'Dr. Per Avseth, CTO of DIG Technology',
                    quote: 'The rock remembers, We support you read it',
                    name: 'Dr. Per Avseth',
                    role: 'DIG CTO & Co-Founder'
                },
                {
                    eyebrow: 'Rock Physics Technology',
                    headingHtml: <><span className="text-pink">IRPM</span><br />– Inverse Rock Physics Modelling</>,
                    description: 'Prediction of rock properties directly from seismic AVO data using stochastic and probabilistic Inverse Rock Physics Modelling.',
                    type: 'product',
                    src: 'brand_assets/IRPM.png',
                    alt: 'IRPM subsurface property prediction model',
                    label: 'IRPM Technology',
                    blend: true
                },
                {
                    eyebrow: 'Reservoir Characterization',
                    headingHtml: <>DIG DEEP <span className="text-pink">3D</span></>,
                    description: 'Predict rock properties away from well control guided by rock physics.',
                    type: 'product',
                    src: 'brand_assets/DIG Deep3D.png',
                    alt: 'DIG DEEP 3D reservoir property prediction volume',
                    label: 'DIG DEEP 3D',
                    blend: false
                }
            ];

            const [currentIndex, setCurrentIndex] = useState(0);
            const [isPaused, setIsPaused] = useState(false);

            useEffect(() => {
                if (isPaused) return;
                const interval = setInterval(() => {
                    setCurrentIndex(prev => (prev + 1) % SLIDES.length);
                }, 5200);
                return () => clearInterval(interval);
            }, [isPaused]);

            const currentSlide = SLIDES[currentIndex];

            return (
                <section className="relative min-h-screen flex items-center overflow-hidden bg-navy" onMouseEnter={() => setIsPaused(true)} onMouseLeave={() => setIsPaused(false)}>
                    <video className="absolute inset-0 w-full h-full object-cover opacity-30 pointer-events-none" autoPlay muted loop playsInline>
                        <source src="brand_assets/background%20video%20for%20Header.mp4" type="video/mp4" />
                    </video>
                    
                    {/* Subsurface Contour Map Overlay */}
                    <div className="absolute inset-0 opacity-[0.06] mix-blend-screen pointer-events-none z-0">
                        <svg width="100%" height="100%" viewBox="0 0 1000 1000" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M0,200 Q250,150 500,200 T1000,200" fill="none" stroke="white" strokeWidth="1" />
                            <path d="M0,300 Q250,250 500,300 T1000,300" fill="none" stroke="white" strokeWidth="1" />
                            <path d="M0,400 Q250,350 500,400 T1000,400" fill="none" stroke="white" strokeWidth="1" />
                            <path d="M0,500 Q250,450 500,500 T1000,500" fill="none" stroke="white" strokeWidth="1" />
                            <path d="M0,600 Q250,550 500,600 T1000,600" fill="none" stroke="white" strokeWidth="1" />
                            <path d="M0,700 Q250,650 500,700 T1000,700" fill="none" stroke="white" strokeWidth="1" />
                        </svg>
                    </div>

                    <div className="absolute inset-0 bg-gradient-to-br from-navy/80 via-navy/55 to-navy/70 z-1" />
                    <div className="container relative z-10 pt-32 pb-20">
                        <div className="grid grid-cols-1 lg:grid-cols-[1fr_420px] gap-y-12 lg:gap-x-15 items-start">
                            <div className="order-1 relative h-[380px] md:h-[420px] w-full">
                                <AnimatePresence mode="wait">
                                    <motion.div key={currentIndex} initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }} transition={{ duration: 0.4 }} className="absolute inset-0 flex flex-col justify-start">
                                        <div className="flex items-center gap-2 text-[0.78rem] font-semibold tracking-widest uppercase text-pink mb-5">
                                            <div className="w-6 h-0.5 bg-pink rounded-full" />
                                            {currentSlide.eyebrow}
                                        </div>
                                        <h1 className="text-4xl md:text-5xl lg:text-6xl font-extrabold leading-tight tracking-tight mb-4">
                                            {currentSlide.headingHtml}
                                        </h1>
                                        <p className="text-base md:text-lg text-muted leading-relaxed max-w-lg">
                                            {currentSlide.description}
                                        </p>
                                    </motion.div>
                                </AnimatePresence>
                            </div>

                            <div className="order-2 relative w-full lg:w-[420px] h-[460px] flex items-start justify-center">
                                <AnimatePresence mode="wait">
                                    <motion.div key={currentIndex} initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0, scale: 1.05 }} transition={{ duration: 0.4 }} className="absolute inset-0 flex flex-col items-center">
                                        {currentSlide.type === 'portrait' ? (
                                            <div className="flex flex-col items-center text-center w-[380px] pt-5">
                                                <div className="relative w-58 h-58 mb-6 rounded-full overflow-hidden border-2 border-white/10 bg-navy-lighter">
                                                    <img src={currentSlide.src} alt={currentSlide.alt} className="relative z-10 w-full h-full object-cover brightness-110 contrast-105" />
                                                </div>
                                                <div className="relative bg-navy-lighter/85 border border-purple/35 rounded-xl p-4 backdrop-blur-md w-full overflow-hidden shadow-2xl">
                                                    <div className="absolute top-0 left-0 right-0 h-0.5 bg-gradient-to-r from-transparent via-purple to-pink" />
                                                    <p className="text-[0.88rem] font-medium italic text-white mb-2">"{currentSlide.quote}"</p>
                                                    <div className="w-7 h-0.5 bg-gradient-to-r from-purple to-pink rounded-full mx-auto my-2" />
                                                    <p className="text-[0.75rem] font-bold tracking-widest uppercase text-white">{currentSlide.name}</p>
                                                    <p className="text-[0.63rem] font-semibold tracking-widest uppercase text-pink">{currentSlide.role}</p>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="relative flex flex-col items-center gap-5 w-full pt-5">
                                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 rounded-full bg-purple/15 blur-3xl" />
                                                <img src={currentSlide.src} alt={currentSlide.alt} className={`relative z-10 w-80 h-80 object-contain ${currentSlide.blend ? 'mix-blend-multiply' : 'mix-blend-screen'}`} />
                                                <span className="relative z-10 text-[0.68rem] font-bold tracking-widest uppercase text-pink bg-pink/10 border border-pink/20 px-4 py-1.5 rounded-full">{currentSlide.label}</span>
                                            </div>
                                        )}
                                    </motion.div>
                                </AnimatePresence>
                            </div>

                            <div className="order-3 lg:col-start-1 flex flex-nowrap gap-4">
                                <a href="#contact" className="btn btn-primary whitespace-nowrap">Discuss your project <Icon name="arrow-right" size={18} /></a>
                                <a href="#technology" className="btn btn-outline whitespace-nowrap">Explore Technology</a>
                            </div>
                        </div>
                        <div className="flex items-center gap-2.5 mt-8">
                            {SLIDES.map((_, i) => (
                                <button key={i} onClick={() => setCurrentIndex(i)} className={`h-2 rounded-full transition-all duration-300 ${currentIndex === i ? 'w-8 bg-pink shadow-lg' : 'w-2 bg-white/20 hover:bg-white/40'}`} />
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const About = () => {
            const features = [
                { icon: "sun", title: "Deep Exploration & R&D Expertise", text: "Our founders bring career experience from major oil companies, academia, and the seismic service industry — spanning rock physics, AVO analysis, quantitative inversion, reservoir prediction, petroleum systems, and software engineering." },
                { icon: "activity", title: "Rock Physics & AVO-Driven Technology", text: "We develop and implement innovative geophysical workflows that extract maximum value from seismic and well data — grounded in rigorous rock physics theory rather than black-box processing." },
                { icon: "leaf", title: "DIG DEEP — Subsurface Prediction", text: "Our proprietary DIG DEEP technology predicts rock properties away from well control, guided by rock physics. The same framework applies from frontier exploration through appraisal, resource mapping, and time-lapse analysis in mature fields." },
                { icon: "database", title: "Full Field Lifecycle & Beyond", text: "From CO₂ storage monitoring and shallow geohazard mapping to geothermal aquifer characterisation — our methods are field-agnostic. Wherever the subsurface holds answers, we help you read them." }
            ];
            const stats = [
                { num: "20", suffix: "+", label: "Years of combined experience" },
                { num: "10", suffix: "+", label: "Peer-reviewed publications" },
                { num: "2021", suffix: "", label: "Founded in Oslo, Norway" }
            ];
            return (
                <section className="relative py-24 overflow-hidden bg-navy" id="about">
                    <div className="absolute inset-0 z-0 opacity-20 mix-blend-overlay pointer-events-none">
                        <img src="brand_assets/contour.jpg" alt="" className="w-full h-full object-cover" />
                    </div>
                    <div className="absolute inset-0 z-1 bg-gradient-to-br from-navy/80 via-purple/20 to-navy/90" />
                    <div className="container relative z-10">
                        <div className="max-w-3xl">
                            <motion.p initial={{ opacity: 0, y: 20 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} className="section-label">Who We Are</motion.p>
                            <motion.h2 initial={{ opacity: 0, y: 20 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} transition={{ delay: 0.1 }} className="section-title">Born from exploration.<br />Built on rock physics.</motion.h2>
                            <motion.p initial={{ opacity: 0, y: 20 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} transition={{ delay: 0.2 }} className="section-subtitle max-w-none mt-5">Founded in 2021 by a team with 20+ years of combined industry and R&D experience, DIG Technology bridges deep-domain geoscience with proprietary data science — delivering subsurface intelligence that major operators trust.</motion.p>
                            <div className="mt-12 flex flex-col">
                                {features.map((f, i) => (
                                    <motion.div key={i} initial={{ opacity: 0, y: 20 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} transition={{ delay: 0.1 * i }} className="flex gap-5 items-start py-5 border-b border-purple/20 last:border-none">
                                        <div className="shrink-0 w-11 h-11 bg-purple/20 border border-purple/40 rounded-xl flex items-center justify-center text-pink"><Icon name={f.icon} size={20} /></div>
                                        <div>
                                            <h3 className="text-[0.92rem] font-bold text-white mb-1.5">{f.title}</h3>
                                            <p className="text-[0.84rem] text-muted leading-relaxed">{f.text}</p>
                                        </div>
                                    </motion.div>
                                ))}
                            </div>
                            <div className="flex gap-8 mt-12 pt-9 border-t border-purple/20">
                                {stats.map((s, i) => (
                                    <div key={i} className="flex-1 pr-8 border-r border-purple/20 last:border-none">
                                        <div className="text-3xl font-extrabold text-white">{s.num}<span className="text-pink">{s.suffix}</span></div>
                                        <div className="text-[0.78rem] text-muted">{s.label}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const Trust = () => {
            const CLIENTS = [
                { name: 'Aker BP', logo: 'brand_assets/AkerBP_logo.jpg' },
                { name: 'INPEX', logo: 'brand_assets/inpex_logo.png' },
                { name: 'OMV', logo: 'brand_assets/OMV_logo.jpg' },
                { name: 'Petronas', logo: 'brand_assets/Petronas_logo.png' },
            ];
            const PARTNERS = [{ name: 'PGS', logo: 'brand_assets/PGS_LOGO_RGB.gif' }];
            return (
                <section className="py-24 bg-navy-light" id="trust">
                    <div className="container">
                        <div className="text-center max-w-xl mx-auto mb-16">
                            <p className="section-label">Clients & Partners</p>
                            <h2 className="section-title">Trusted by industry leaders</h2>
                            <p className="section-subtitle mx-auto">Leading exploration and production companies trust DIG Technology to reduce subsurface uncertainty and sharpen investment decisions.</p>
                        </div>
                        <div className="mb-12">
                            <p className="flex items-center gap-4 text-[0.7rem] font-bold tracking-widest uppercase text-muted mb-5 after:content-[''] after:flex-1 after:h-px after:bg-purple/20">Clients</p>
                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                {CLIENTS.map((c, i) => (
                                    <div key={i} className="group relative bg-navy-lighter/50 border border-purple/20 rounded-xl h-24 flex items-center justify-center p-5 transition-all hover:border-purple/60 hover:-translate-y-1 overflow-hidden">
                                        <div className="absolute top-0 left-0 right-0 h-[3px] bg-gradient-to-r from-purple via-pink to-pink opacity-0 transition-opacity duration-300 group-hover:opacity-100 z-10" />
                                        <img src={c.logo} alt={c.name} className="max-w-full max-h-12 object-contain grayscale opacity-50 group-hover:grayscale-0 group-hover:opacity-100 transition-all duration-300" />
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div>
                            <p className="flex items-center gap-4 text-[0.7rem] font-bold tracking-widest uppercase text-muted mb-5 after:content-[''] after:flex-1 after:h-px after:bg-purple/20">Partners</p>
                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                {PARTNERS.map((p, i) => (
                                    <div key={i} className="group relative bg-navy-lighter/50 border border-purple/20 rounded-xl h-24 flex items-center justify-center p-5 transition-all hover:border-purple/60 hover:-translate-y-1 overflow-hidden">
                                        <div className="absolute top-0 left-0 right-0 h-[3px] bg-gradient-to-r from-purple via-pink to-pink opacity-0 transition-opacity duration-300 group-hover:opacity-100 z-10" />
                                        <img src={p.logo} alt={p.name} className="max-w-full max-h-12 object-contain grayscale opacity-50 group-hover:grayscale-0 group-hover:opacity-100 transition-all duration-300" />
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const Technology = () => {
            const CARDS = [
                { title: <>DIG DEEP AVO<br />Feasibility Modelling</>, desc: "Geologically constrained AVO feasibility maps and volumes that predict which seismic signatures to expect for different reservoir fluid and lithology scenarios.", img: "brand_assets/DIG Deep3D.png" },
                { title: <>Density Ratio<br />Inversion</>, desc: "A proprietary inversion method extracting acoustic impedance and density ratios directly from seismic AVO data without conventional approximations.", img: "brand_assets/Desnsityratio.png" },
                { title: <><span>IRPM</span> — Inverse Rock<br />Physics Modelling</>, desc: "Stochastic and probabilistic rock physics modelling predicting reservoir properties such as porosity, saturation, and lithology directly from seismic data.", img: "brand_assets/IRPMtech.png" }
            ];
            return (
                <section className="py-24 bg-navy" id="technology">
                    <div className="container">
                        <div className="text-center max-w-2xl mx-auto mb-16">
                            <p className="section-label">Proprietary Technology</p>
                            <h2 className="section-title">Core methods, built in-house</h2>
                            <p className="section-subtitle mx-auto">Three proprietary rock physics frameworks developed over decades of research.</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {CARDS.map((c, i) => (
                                <div key={i} className="group relative bg-navy-lighter/40 border border-purple/20 rounded-2xl overflow-hidden transition-all hover:border-purple/60 hover:-translate-y-2 shadow-xl flex flex-col">
                                    <div className="absolute top-0 left-0 right-0 h-[3px] bg-gradient-to-r from-purple via-pink to-pink opacity-0 transition-opacity duration-300 group-hover:opacity-100 z-10" />
                                    <div className="p-8 relative z-1">
                                        <span className="text-[0.6rem] font-bold tracking-widest uppercase text-pink mb-3 block">Proprietary</span>
                                        <h3 className="text-lg font-bold mb-4 text-white">{c.title}</h3>
                                        <p className="text-sm text-off-white/80 leading-relaxed">{c.desc}</p>
                                    </div>
                                    <div className="px-8 pb-8 mt-auto relative z-1">
                                        <div className="bg-navy/40 rounded-lg border border-purple/15 overflow-hidden h-48 flex items-center justify-center p-2">
                                            <img src={c.img} alt="" className="max-w-full max-h-full object-contain transition-transform duration-500 group-hover:scale-105" />
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Industries = () => {
            const INDS = [
                { id: 0, tab: 'Frontier Exploration', eyebrow: 'Frontier Exploration', desc: 'De-risking exploration in data-sparse and underexplored subsurface regions.', img: 'brand_assets/frontier.png' },
